networks:
  notes:
services:
  PostgresDB:
    image: postgres
    restart: always
    container_name: "PG_CONTAINER"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5436:5432"
    volumes:
      - PostgresDB:/var/lib/postgresql/data
    networks:
      - notes
  app:
    build: .
    container_name: "FASTAPI_CONTAINER"
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    #    environment:
    #      - DATABASE_URL=postgresql://postgres:admin@PostgresDB:5432/postgres
    #      - SECRET_KEY=super_secret_key_change_me_in_production_1234567890
    #      - ALGORITHM=HS256
    #      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      - PostgresDB
    networks:
      - notes
volumes:
  PostgresDB: